{{ define "main" }}
<div class="page-hero">
  <h1>{{ .Title }}</h1>
  {{ with .Params.subtitle }}<p>{{ . }}</p>{{ end }}
</div>
<div class="breadcrumbs">
  <a href="/">Home</a> <span>›</span> <span>{{ .Title }}</span>
</div>
<div class="section">
  <div class="container">
    {{ .Content }}
    {{ if .Pages }}
    <div class="card-grid">
      {{ range .Pages }}
      <a href="{{ .RelPermalink }}" class="card" style="text-decoration:none; color:inherit;">
        <div class="card-icon">{{ with .Params.icon }}{{ . }}{{ else }}🌴{{ end }}</div>
        <h3>{{ .Title }}</h3>
        <p>{{ .Params.description | default .Summary }}</p>
      </a>
      {{ end }}
    </div>
    {{ end }}
  </div>
</div>
{{ end }}
